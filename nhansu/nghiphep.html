<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Ngày Phép - LSPD</title>
    
    <!-- Mạng phân phối nội dung Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        :root {
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            min-height: 100vh;
        }
        
        .glass-panel {
            background-color: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #475569; }

        /* Input Fields */
        .form-input {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: #f8fafc;
            transition: all 0.2s ease;
            width: 100%;
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        /* Modal Animation */
        .modal-overlay {
            position: fixed; inset: 0;
            background-color: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            transform: scale(0.95) translateY(10px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0;
        }
        .modal-overlay.active .modal-content { 
            transform: scale(1) translateY(0); 
            opacity: 1;
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .badge-pending { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: rgba(245, 158, 11, 0.2); }
        .badge-approved { background-color: rgba(16, 185, 129, 0.1); color: #34d399; border-color: rgba(16, 185, 129, 0.2); }
        .badge-denied { background-color: rgba(239, 68, 68, 0.1); color: #f87171; border-color: rgba(239, 68, 68, 0.2); }

        /* Admin Controls */
        .admin-only { display: none !important; }
        body.is-admin .admin-only-cell { display: table-cell !important; }
        body.is-admin .admin-only-flex { display: flex !important; }
    </style>
</head>
<body class="antialiased selection:bg-blue-500/30">

    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="flex items-center gap-4">
                <a href="/vanphong/index.html" class="relative p-2 bg-white/5 rounded-xl border border-white/10 shadow-inner hover:bg-white/10 transition-colors cursor-pointer block">
                    <img src="/images/LSPD_LOGO.PNG" 
                         alt="LSPD Logo" class="h-12 w-auto object-contain drop-shadow-lg"/>
                </a>
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-orange-400 tracking-tight">
                        HỆ THỐNG XIN NGHỈ PHÉP
                    </h1>
                    <p class="text-sm text-slate-400 font-medium tracking-widest uppercase mt-1">Los Santos Police Department</p>
                </div>
            </div>

            <!-- Nút Đăng nhập Admin -->
            <button id="loginToggleBtn" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold text-yellow-500 bg-yellow-500/10 border border-yellow-500/20 hover:bg-yellow-500/20 transition cursor-pointer">
                <i class="fas fa-lock"></i> Đăng nhập Admin
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Cột Form Xin Nghỉ Phép (Công khai, ai cũng điền được) -->
            <div class="lg:col-span-1">
                <div class="glass-panel p-6 border-t-4 border-t-amber-500">
                    <h2 class="text-lg font-bold text-white mb-5 flex items-center gap-2">
                        <i class="fas fa-file-signature text-amber-400"></i> Nộp Đơn Xin Nghỉ Phép
                    </h2>
                    <form id="leaveForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Tên Sĩ Quan</label>
                            <input type="text" id="officerName" class="form-input" placeholder="VD: Hobber" required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Số Hiệu Call Sign</label>
                            <input type="text" id="officerUID" class="form-input" placeholder="Call Sign..." required>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Đơn Vị Công Tác</label>
                            <input type="text" id="officerTeam" class="form-input" placeholder="VD: Patrol Unit" required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">Từ Ngày</label>
                                <input type="date" id="startDate" class="form-input" required>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1">Đến Ngày</label>
                                <input type="date" id="endDate" class="form-input" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Lý Do / Trình Bày</label>
                            <textarea id="reason" rows="3" class="form-input resize-none" placeholder="Lý do xin nghỉ..." required></textarea>
                        </div>
                        <button type="submit" id="submitLeaveBtn" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-medium py-2.5 rounded-lg transition-colors shadow-lg shadow-amber-500/20 mt-2">
                            Gửi Đơn Lên Chỉ Huy
                        </button>
                    </form>
                </div>
            </div>

            <!-- Cột Danh Sách Đơn -->
            <div class="lg:col-span-2">
                <div class="glass-panel overflow-hidden h-full flex flex-col">
                    <div class="p-5 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                        <h2 class="text-lg font-bold text-white flex items-center gap-2">
                            <i class="fas fa-list-ul text-slate-400"></i> Danh Sách Chờ Phê Duyệt
                        </h2>
                    </div>
                    
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-slate-300 uppercase bg-slate-900/50 border-b border-slate-700">
                                <tr>
                                    <th scope="col" class="px-5 py-4 font-semibold w-12 text-center">STT</th>
                                    <th scope="col" class="px-5 py-4 font-semibold">Sĩ Quan & Đơn Vị</th>
                                    <th scope="col" class="px-5 py-4 font-semibold">Thời Gian</th>
                                    <th scope="col" class="px-5 py-4 font-semibold w-1/3">Lý Do</th>
                                    <th scope="col" class="px-5 py-4 font-semibold text-center">Tình Trạng</th>
                                    <!-- Cột này chỉ hiện với Admin -->
                                    <th scope="col" class="px-5 py-4 font-semibold text-center admin-only admin-only-cell w-28">Thao Tác</th>
                                </tr>
                            </thead>
                            <tbody id="leaveRequestsTableBody" class="divide-y divide-slate-700/50 text-slate-300">
                                <tr><td colspan="6" class="px-6 py-12 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>Đang tải dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Modal Login Admin -->
    <div id="loginModal" class="modal-overlay">
        <div class="glass-panel p-6 w-full max-w-sm modal-content border border-yellow-500/30">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-lock text-yellow-400"></i>
                    Đăng Nhập Quản Trị
                </h3>
                <button id="closeLoginBtn" class="text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <input type="email" id="adminEmail" class="form-input" required placeholder="admin@lspd.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Mật khẩu</label>
                    <input type="password" id="adminPassword" class="form-input" required placeholder="••••••••">
                </div>
                <div id="loginError" class="text-red-400 text-sm hidden">Sai email hoặc mật khẩu!</div>
                <button type="submit" id="submitLoginBtn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2.5 rounded-lg transition-colors shadow-lg shadow-yellow-600/20 mt-4">Đăng Nhập</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Cấu hình Firebase
       const firebaseConfig = {
    apiKey: "AIzaSyDqrNSm3VX_yNWyJI9_1WkOSh6jQrLADrA",
    authDomain: "lspd-9df02.firebaseapp.com",
    projectId: "lspd-9df02",
    storageBucket: "lspd-9df02.firebasestorage.app",
    messagingSenderId: "11728695203",
    appId: "1:11728695203:web:44e134b91bdbecd3143416"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Biến toàn cục
        const collectionName = "leave_requests";
        let isAdmin = false;

        // Phân quyền
        onAuthStateChanged(auth, (user) => {
            const loginToggleBtn = document.getElementById('loginToggleBtn');
            if (user) {
                if (!user.isAnonymous) {
                    // Chế độ Admin
                    isAdmin = true;
                    document.body.classList.add('is-admin');
                    loginToggleBtn.innerHTML = `<i class="fas fa-unlock"></i> Đăng xuất`;
                    loginToggleBtn.classList.replace('text-yellow-500', 'text-red-400');
                    loginToggleBtn.classList.replace('border-yellow-500/20', 'border-red-400/30');
                    loginToggleBtn.classList.replace('bg-yellow-500/10', 'bg-red-400/10');
                    loginToggleBtn.classList.replace('hover:bg-yellow-500/20', 'hover:bg-red-400/20');
                } else {
                    // Chế độ Khách
                    isAdmin = false;
                    document.body.classList.remove('is-admin');
                    loginToggleBtn.innerHTML = `<i class="fas fa-lock"></i> Đăng nhập Admin`;
                    loginToggleBtn.classList.replace('text-red-400', 'text-yellow-500');
                    loginToggleBtn.classList.replace('border-red-400/30', 'border-yellow-500/20');
                    loginToggleBtn.classList.replace('bg-red-400/10', 'bg-yellow-500/10');
                    loginToggleBtn.classList.replace('hover:bg-red-400/20', 'hover:bg-yellow-500/20');
                }
                listenForLeaveRequests(); // Cập nhật lại UI bảng
            } else {
                signInAnonymously(auth).catch(console.error);
            }
        });

        // Xử lý Login Modal
        const loginModal = document.getElementById('loginModal');
        document.getElementById('loginToggleBtn').addEventListener('click', () => {
            if (isAdmin) signOut(auth);
            else loginModal.classList.add('active');
        });
        document.getElementById('closeLoginBtn').addEventListener('click', () => loginModal.classList.remove('active'));
        loginModal.addEventListener('click', (e) => { if(e.target === loginModal) loginModal.classList.remove('active'); });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitLoginBtn');
            const errorText = document.getElementById('loginError');
            btn.disabled = true; btn.innerText = "Đang kiểm tra...";
            errorText.classList.add('hidden');
            
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPassword').value);
                loginModal.classList.remove('active');
                document.getElementById('loginForm').reset();
            } catch (error) {
                errorText.classList.remove('hidden');
                console.error("Lỗi đăng nhập:", error);
            } finally {
                btn.disabled = false; btn.innerText = "Đăng Nhập";
            }
        });

        // Form Submit Logic (Nộp đơn)
        const leaveForm = document.getElementById('leaveForm');
        leaveForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitLeaveBtn');
            const origText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Đang Gửi...';

            try {
                await addDoc(collection(db, collectionName), {
                    name: document.getElementById('officerName').value.trim(),
                    uid: document.getElementById('officerUID').value.trim(),
                    team: document.getElementById('officerTeam').value.trim(),
                    startDate: document.getElementById('startDate').value,
                    endDate: document.getElementById('endDate').value,
                    reason: document.getElementById('reason').value.trim(),
                    status: 'Chờ duyệt', // Trạng thái mặc định
                    createdAt: serverTimestamp()
                });
                leaveForm.reset();
                alert("Gửi đơn thành công! Vui lòng chờ Chỉ huy phê duyệt.");
            } catch (error) {
                console.error("Lỗi khi gửi đơn: ", error);
                alert("Có lỗi xảy ra, vui lòng thử lại!");
            } finally {
                btn.disabled = false; btn.innerHTML = origText;
            }
        });

        // Lấy dữ liệu Realtime
        const tableBody = document.getElementById('leaveRequestsTableBody');
        
        function listenForLeaveRequests() {
            const q = query(collection(db, collectionName), orderBy("createdAt", "desc"));
            onSnapshot(q, (querySnapshot) => {
                tableBody.innerHTML = '';
                let stt = 1;

                if(querySnapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500">Chưa có đơn xin nghỉ phép nào.</td></tr>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const request = docSnap.data();
                    const row = document.createElement('tr');
                    row.className = 'border-b border-slate-700/50 hover:bg-slate-800/40 transition-colors group';

                    // Xử lý Trạng Thái & Ghi chú tự động
                    let statusClass = 'badge-pending';
                    let noteText = '';
                    let noteClass = 'text-slate-500 text-xs';
                    let iconClass = 'fa-clock text-amber-500';

                    if(request.status === 'Từ chối') {
                        statusClass = 'badge-denied';
                        iconClass = 'fa-times-circle text-red-500';
                    } else if (request.status === 'Đã duyệt') {
                        statusClass = 'badge-approved';
                        iconClass = 'fa-check-circle text-emerald-500';
                        
                        // Tính toán thời gian
                        const now = new Date();
                        now.setHours(0, 0, 0, 0);
                        const endDate = new Date(request.endDate);
                        if (now > endDate) {
                            noteText = 'Đã hết phép';
                            noteClass = 'text-red-400 font-semibold text-xs';
                        } else {
                            noteText = 'Đang nghỉ';
                            noteClass = 'text-emerald-400 font-semibold text-xs';
                        }
                    }

                    // Render Row
                    row.innerHTML = `
                        <td class="px-5 py-4 text-center text-slate-500 font-medium">${stt++}</td>
                        <td class="px-5 py-4">
                            <div class="font-semibold text-white whitespace-nowrap">${request.name}</div>
                            <div class="text-xs font-mono text-slate-400 mt-0.5">UID: ${request.uid} | ${request.team}</div>
                        </td>
                        <td class="px-5 py-4 text-slate-300 whitespace-nowrap text-xs">
                            <span class="text-blue-300">${formatDate(request.startDate)}</span>
                            <br>đến <span class="text-orange-300">${formatDate(request.endDate)}</span>
                        </td>
                        <td class="px-5 py-4 text-slate-300 text-sm"><div class="line-clamp-2">${request.reason}</div></td>
                        <td class="px-5 py-4 text-center">
                            <div class="flex flex-col items-center gap-1.5">
                                <span class="badge ${statusClass}"><i class="fas ${iconClass} mr-1.5"></i>${request.status}</span>
                                ${noteText ? `<span class="${noteClass}">${noteText}</span>` : ''}
                            </div>
                        </td>
                        <!-- Cột Thao Tác - Bị ẩn nếu không phải Admin -->
                        <td class="px-5 py-4 text-center admin-only admin-only-cell">
                            <div class="flex justify-center gap-1">
                                ${request.status === 'Chờ duyệt' ? `
                                    <button data-id="${docSnap.id}" class="action-btn approve-btn p-1.5 text-emerald-500 hover:bg-emerald-500/10 rounded transition" title="Phê Duyệt"><i class="fas fa-check pointer-events-none"></i></button>
                                    <button data-id="${docSnap.id}" class="action-btn deny-btn p-1.5 text-red-500 hover:bg-red-500/10 rounded transition" title="Từ Chối"><i class="fas fa-times pointer-events-none"></i></button>
                                ` : ''}
                                <button data-id="${docSnap.id}" class="action-btn delete-btn p-1.5 text-slate-500 hover:text-red-400 hover:bg-red-400/10 rounded transition" title="Xóa Đơn"><i class="fas fa-trash pointer-events-none"></i></button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }, (error) => {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-400">Lỗi kết nối cơ sở dữ liệu.</td></tr>`;
            });
        }

        // Xử lý Hành động của Admin (Duyệt/Từ chối/Xóa)
        tableBody.addEventListener('click', async (e) => {
            if(!isAdmin) return; // Bảo mật frontend thêm 1 lớp
            
            const btn = e.target.closest('.action-btn');
            if(!btn) return;

            const docId = btn.getAttribute('data-id');
            const docRef = doc(db, collectionName, docId);

            try {
                if (btn.classList.contains('delete-btn')) {
                    if(confirm("Bạn có chắc chắn muốn xóa đơn nghỉ phép này không?")) {
                        await deleteDoc(docRef);
                    }
                } else if (btn.classList.contains('approve-btn')) {
                    await updateDoc(docRef, { status: 'Đã duyệt' });
                } else if (btn.classList.contains('deny-btn')) {
                    await updateDoc(docRef, { status: 'Từ chối' });
                }
            } catch (error) {
                console.error("Lỗi thao tác: ", error);
                alert("Không thể thực hiện. Vui lòng kiểm tra quyền truy cập.");
            }
        });

        // Helper format ngày
        function formatDate(dateString) {
            if(!dateString) return '';
            const parts = dateString.split('-');
            if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateString;
        }
    </script>
</body>
</html>
